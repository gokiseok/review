<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고기석 리뷰 답글 생성기</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --gold: #c4953a;
      --gold-hover: #d4a84a;
      --text: #e8e8e8;
      --muted: #888;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .api-key-row {
      display: flex;
      gap: 8px;
    }

    .api-key-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .api-key-row input:focus { border-color: var(--gold); }
    .api-key-row input::placeholder { color: #444; }

    .btn-save-key {
      padding: 10px 16px;
      background: transparent;
      color: var(--gold);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      border: 1px solid var(--gold);
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s;
    }

    .btn-save-key:hover { background: var(--gold); color: #111; }
    .btn-save-key.saved { border-color: #4caf50; color: #4caf50; }

    .key-status {
      font-size: 0.75rem;
      margin-top: 8px;
      color: var(--muted);
    }

    .key-status.ok { color: #4caf50; }
    .key-status.none { color: #e57373; }

    textarea {
      width: 100%;
      min-height: 140px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--gold); }
    textarea::placeholder { color: #444; }

    .btn-generate {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      background: var(--gold);
      color: #111;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-generate:hover:not(:disabled) { background: var(--gold-hover); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: #444;
      margin-top: 8px;
    }

    .result-card {
      width: 100%;
      max-width: 680px;
      display: none;
    }

    .result-card.visible { display: block; }

    .result-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .result-header label { margin-bottom: 0; }

    .btn-reset {
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.2s;
    }
    .btn-reset:hover { color: var(--text); }

    #output {
      min-height: 80px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      outline: none;
      transition: border-color 0.2s;
    }

    #output:focus { border-color: var(--gold); }
    #output:empty::before { content: attr(data-placeholder); color: #444; }

    .btn-copy {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      background: transparent;
      color: var(--gold);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      border: 1px solid var(--gold);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-copy:hover { background: var(--gold); color: #111; }
    .btn-copy.copied { background: #1a3a1a; border-color: #4caf50; color: #4caf50; }

    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #111;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #e57373;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }

    @media (max-width: 480px) {
      body { padding: 24px 12px; }
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>고기석 리뷰 답글 생성기</h1>
    <p>리뷰 붙여넣기 → 답글 생성 → 복사. 끝.</p>
  </header>

  <!-- API Key -->
  <div class="card">
    <label>Anthropic API Key</label>
    <div class="api-key-row">
      <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
      <button class="btn-save-key" id="saveKeyBtn" onclick="saveKey()">저장</button>
    </div>
    <div class="key-status" id="keyStatus"></div>
  </div>

  <!-- Review Input -->
  <div class="card">
    <label for="review">고객 리뷰</label>
    <textarea
      id="review"
      placeholder="네이버 플레이스에서 고객 리뷰를 복사해서 붙여넣으세요."
    ></textarea>
    <div class="error-msg" id="errorMsg"></div>
    <button class="btn-generate" id="generateBtn" onclick="generate()">답글 생성</button>
    <div class="hint">⌘ + Enter / Ctrl + Enter</div>
  </div>

  <!-- Result -->
  <div class="result-card" id="resultCard">
    <div class="result-box">
      <div class="result-header">
        <label>생성된 답글 (수정 가능)</label>
        <button class="btn-reset" onclick="reset()">초기화</button>
      </div>
      <div
        id="output"
        contenteditable="true"
        data-placeholder="답글이 여기에 표시됩니다."
      ></div>
      <button class="btn-copy" id="copyBtn" onclick="copy()">복사</button>
    </div>
  </div>

  <script>
    const SYSTEM_PROMPT = `당신은 서울 광진구 건대입구역 근처 통갈매기살 전문 고기집 고기석의 사장님입니다.
고객 리뷰를 보고 네이버 플레이스 사장님 답글을 작성합니다.
리뷰의 감정, 적절한 톤, SEO 키워드를 직접 판단하세요.
SEO 키워드(건대 고기집, 건대 회식, 건대 단체모임, 건대청첩장모임, 건대룸식당, 건대병원맛집) 중 1~2개를 자연스럽게 포함.
답글 2~4문장(100~200자), 이모지 최대 1개, 매장명 고기석 1회 언급, 재방문 유도 포함.
답글 텍스트만 출력.`;

    const KEY_STORAGE = 'gokiseok_api_key';

    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn  = document.getElementById('saveKeyBtn');
    const keyStatus   = document.getElementById('keyStatus');
    const reviewEl    = document.getElementById('review');
    const generateBtn = document.getElementById('generateBtn');
    const resultCard  = document.getElementById('resultCard');
    const outputEl    = document.getElementById('output');
    const copyBtn     = document.getElementById('copyBtn');
    const errorMsg    = document.getElementById('errorMsg');

    // 저장된 키 불러오기
    (function init() {
      const saved = localStorage.getItem(KEY_STORAGE);
      if (saved) {
        apiKeyInput.value = saved;
        showKeyStatus(true);
      } else {
        showKeyStatus(false);
      }
    })();

    function saveKey() {
      const key = apiKeyInput.value.trim();
      if (!key.startsWith('sk-ant-')) {
        keyStatus.textContent = '올바른 Anthropic API 키를 입력해주세요. (sk-ant- 로 시작)';
        keyStatus.className = 'key-status none';
        return;
      }
      localStorage.setItem(KEY_STORAGE, key);
      showKeyStatus(true);
      saveKeyBtn.textContent = '저장됨';
      saveKeyBtn.classList.add('saved');
      setTimeout(() => {
        saveKeyBtn.textContent = '저장';
        saveKeyBtn.classList.remove('saved');
      }, 2000);
    }

    function showKeyStatus(ok) {
      if (ok) {
        keyStatus.textContent = '✓ API 키가 이 브라우저에 저장되어 있습니다.';
        keyStatus.className = 'key-status ok';
      } else {
        keyStatus.textContent = 'API 키가 없습니다. 입력 후 저장하세요.';
        keyStatus.className = 'key-status none';
      }
    }

    // 단축키
    reviewEl.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') generate();
    });

    async function generate() {
      const apiKey = localStorage.getItem(KEY_STORAGE);
      if (!apiKey) {
        showError('먼저 API 키를 입력하고 저장해주세요.');
        return;
      }

      const review = reviewEl.value.trim();
      if (!review) {
        showError('리뷰를 입력해주세요.');
        return;
      }

      clearError();
      setLoading(true);
      resultCard.classList.remove('visible');
      outputEl.textContent = '';

      try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
            'content-type': 'application/json',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-5',
            max_tokens: 512,
            system: SYSTEM_PROMPT,
            messages: [{ role: 'user', content: review }],
          }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err?.error?.message || `API 오류 (${res.status})`);
        }

        const data = await res.json();
        const reply = data?.content?.[0]?.text?.trim() || '';
        outputEl.textContent = reply;
        resultCard.classList.add('visible');
        copyBtn.textContent = '복사';
        copyBtn.classList.remove('copied');
      } catch (err) {
        showError(err.message || '알 수 없는 오류가 발생했습니다.');
      } finally {
        setLoading(false);
      }
    }

    async function copy() {
      const text = outputEl.innerText.trim();
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = '복사 완료!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = '복사';
          copyBtn.classList.remove('copied');
        }, 2000);
      } catch {
        copyBtn.textContent = '복사 실패';
      }
    }

    function reset() {
      reviewEl.value = '';
      outputEl.textContent = '';
      resultCard.classList.remove('visible');
      clearError();
      reviewEl.focus();
    }

    function setLoading(on) {
      generateBtn.disabled = on;
      generateBtn.innerHTML = on
        ? '<span class="loader"></span>생성 중…'
        : '답글 생성';
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    function clearError() {
      errorMsg.style.display = 'none';
      errorMsg.textContent = '';
    }
  </script>
</body>
</html>
